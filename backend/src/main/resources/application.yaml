spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/docflow_ai
    username: docflow
    password: docflow

  sql:
    init:
      mode: always
      continue-on-error: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

server:
  error:
    include-message: always

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

app:
  storage:
    upload-dir: storage/uploads
  ai:
    service-url: http://localhost:8000
  security:
    jwt:
      issuer: docflow-ai
      secret: VGhpcy1pcy1hLWRldmVsb3BtZW50LXNlY3JldC1mb3ItZG9jZmxvdy1haS0zMi1ieXRlcw==
      expiration-minutes: 240
    internal-token: change-me-in-local-dev
