services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docflow_ai
      POSTGRES_USER: docflow
      POSTGRES_PASSWORD: docflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docflow -d docflow_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/docflow_ai
      SPRING_DATASOURCE_USERNAME: docflow
      SPRING_DATASOURCE_PASSWORD: docflow
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8080:8080"
    volumes:
      - ./storage/uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  service-ai:
    build:
      context: ./service-ai
      dockerfile: Dockerfile
    environment:
      PYTHONUNBUFFERED: 1
      BACKEND_BASE_URL: http://backend:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_QUEUE: job_queue
      STORAGE_UPLOADS_PATH: /app/storage/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./storage/uploads:/app/storage/uploads
    depends_on:
      backend:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:



